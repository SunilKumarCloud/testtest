name: Run every 10 minutes after anchor time

on:
  schedule:
    - cron: "20/10 * * * *"   # 10:20, 10:30, 10:40… UTC ⇒ 15:50, 16:00, 16:10… IST
  workflow_dispatch:

jobs:
  gated-job:
    runs-on: ubuntu-latest

    steps:
      - name: Enforce start time
        run: |
          # anchor 4 Mar 2026 15:50 IST → 10:20 UTC
          ANCHOR_UTC="2026-03-04 10:25"

          NOW_UTC=$(date -u +"%Y-%m-%d %H:%M")
          ANCHOR_TS=$(date -u -d "$ANCHOR_UTC" +%s)
          NOW_TS=$(date -u -d "$NOW_UTC" +%s)

          echo "Anchor UTC : $ANCHOR_UTC"
          echo "Current UTC: $NOW_UTC"

          if [ "$NOW_TS" -lt "$ANCHOR_TS" ]; then
            echo "⏭️  Before anchor time. Skipping run."
            exit 0
          fi

          echo "✅ Anchor time reached. Proceeding..."

      - name: Actual job logic
        run: |
          echo "🔥 This job runs every 10 minutes forever after 04‑03‑2026 3:50 PM IST"